<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 3 - Responsive Grid</title>
    <!-- Bootstrap 5 CSS via CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <style>
      /* Styling to make the grid columns visible */
      .custom-col {
        background-color: #0d6efd;
        color: white;
        border: 2px solid #0a58ca;
        padding: 20px;
        text-align: center;
        border-radius: 5px;
      }
    </style>
  </head>
  <body class="bg-light pt-5">

    <!-- Exercise 3.1 & 3.2: Responsive Grid -->
    <div class="container">
      <h2 class="text-center mb-4">Responsive Grid Layout (Exercise 3)</h2>
      <p class="text-center text-muted mb-5">
        Resize the browser window to see the columns shift.
        <br><strong>Mobile:</strong> Stacked vertically (1 per row)
        <br><strong>Tablet:</strong> 2 per row
        <br><strong>Desktop:</strong> 3 per row
      </p>

      <!-- 
        Grid setup:
        col-12: Full width on mobile (stacks vertically)
        col-md-6: 50% width on tablet (2 per row)
        col-lg-4: 33.333% width on desktop (3 per row)
      -->
      <div class="row g-4">
        <!-- Column 1 -->
        <div class="col-12 col-md-6 col-lg-4">
          <div class="custom-col">
            <h5>Column 1</h5>
          </div>
        </div>
        
        <!-- Column 2 -->
        <div class="col-12 col-md-6 col-lg-4">
          <div class="custom-col">
            <h5>Column 2</h5>
          </div>
        </div>

        <!-- Column 3 -->
        <div class="col-12 col-md-6 col-lg-4">
          <div class="custom-col">
            <h5>Column 3</h5>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap 5 JS Bundle via CDN -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmZXvZ4pmUPfMBHf1HkP6OwnDDP4"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
